<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salmo 19 - Oracle</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #1a1410;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .back-link {
        margin-bottom: 20px;
        background: rgba(255, 255, 255, 0.3);
        padding: 8px 12px;
        border-radius: 3px;
        text-decoration: none;
        color: #d4c5a0;
        font-size: 0.9em;
        transition: background 0.3s;
        align-self: flex-start;
      }

      .back-link:hover {
        background: rgba(255, 255, 255, 0.6);
      }

      img {
        max-width: 100%;
        height: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        border-radius: 5px;
      }

      @media (max-width: 600px) {
        img {
          max-width: 95%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="./index.html" class="back-link">← Voltar</a>
      <img src="./assets/Salmo-139-1-10.png" alt="Salmos 139:1-10">
